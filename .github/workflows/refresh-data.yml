name: Refresh pipeline data

# Runs twice a day, every day: 11:00 UTC and 18:00 UTC
# (≈ 7:00 AM and 2:00 PM US Eastern during EDT,
#   6:00 AM and 1:00 PM US Eastern during EST).
# Also runs on demand from the Actions tab.

on:
  schedule:
    - cron: '0 11,18 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-pipeline-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          # Full history so `git pull --rebase` in the push-retry loop
          # below has enough to rebase onto if another commit lands on
          # main between checkout and push.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pull data from Zoho and write data.json
        env:
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_DC: com
        run: python scripts/refresh_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # nullglob so data-*.json / pipeline_velocity-*.json expand to
          # nothing (not a literal) when no per-view files exist yet
          # (e.g. first run, or empty views.json).
          shopt -s nullglob
          git add data.json data-*.json \
                  stage_history.json \
                  pipeline_velocity.json pipeline_velocity-*.json
          if git diff --cached --quiet; then
            echo "No data changes this run — skipping commit."
            exit 0
          fi

          stamp=$(date -u +%Y-%m-%dT%H:%MZ)
          git commit -m "Refresh pipeline data ($stamp)"

          # Push with rebase-and-retry. The concurrency guard keeps two
          # scheduled runs from racing each other, but a manual commit
          # to main during an in-flight run will still cause a
          # non-fast-forward rejection. Rebase our single data commit
          # onto whatever landed and try again, up to 5 times.
          for attempt in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing on origin/main and retrying."
            git pull --rebase --autostash origin main
          done

          echo "Push still failing after 5 attempts — giving up." >&2
          exit 1
